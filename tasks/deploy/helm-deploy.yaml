apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: helm-deploy
spec:
  params:
    - description: Kuadrant image url
      name: index-image
      type: string
    - description: Kuadrant image channel. Can be 'preview' for nightlies and 'stable' for releases
      name: channel
      type: string
    - description: Istio provider (ossm3, ocp); 'ossm3' (recommended for all Openshift versions), 'ocp' for installing Istio managed by Gateway API on OCP v4.19+ (not recommended - mTLS is not supported)
      name: istio-provider
      type: string
    - description: GatewayAPI CRD version. [v1.2.1, v1.3.0, v1.4.0] available; leave empty if installing on Openshift 4.19+.
      name: gateway-crd
      type: string
    - description: Path to workspace kubeconfig
      name: kubeconfig-path
      type: string
    - description: Kuadrant operator name. 'kuadrant-operator' or 'rhcl-operator'
      name: operator-name
      type: string
    - description: Additional flags for helm install command, example '--set=kuadrant.installPlanApproval=Manual --set=kuadrant.startingCSV=kuadrant-operator.v1.2.0'"
      name: additional-helm-flags
      type: string
    - description: Additional flags for tools helm, example '--set=tools.keycloak.keycloakProvider=deployment --set=tools.valkey.enable=false'"
      name: additional-helm-tools-flags
      type: string
    - description: Extensions image to overwrite default one.
      name: extensions-image
      type: string
    - description: If set to 'true' tools operators and instances will be installed
      name: install-tools
      type: string
    - description: If set to 'true' Kuadrant operators and instances will be installed
      name: install-kuadrant
      type: string
    - description: Secret name containing additional Helm values manifest (additionalManifests.yaml)
      name: additional-manifests-secret
      type: string
  steps:
  # Uninstall steps first(cleanup before install)
  - name: remove-leftovers-kuadrant-ns
    args:
      - >-
        if [ "$(params.install-kuadrant)" = "true" ]; then
          for crd in $(kubectl get crd -o name | grep "kuadrant" | sed 's/.*\/\(.*\)/\1/'); do
              if [ "$crd" = "dnsrecords.kuadrant.io" ]; then
                  for record in $(kubectl get --chunk-size=0 -o name -n "kuadrant" "$crd"); do
                      if kubectl get -n "kuadrant" $record -o jsonpath='{.status.conditions}' | grep "The dns provider could not be loaded"; then
                         echo "Force deleting (deleting finalizers) due to missing secret on: $record";
                         kubectl delete "$record" -n "kuadrant" --wait=false;
                         kubectl patch "$record" -n "kuadrant" --type=merge -p '{"metadata":{"finalizers":null}}';
                      fi
                  done
              fi
              kubectl get --chunk-size=0 -o name -n "kuadrant" "$crd" |\
              xargs --no-run-if-empty -P 20 -n 1 kubectl delete --ignore-not-found -n "kuadrant"
          done
        else
          echo "Skipping Kuadrant cleanup (install-kuadrant=false)"
        fi
    command:
      - /bin/bash
      - -vc
    env:
      - name: KUBECONFIG
        value: $(params.kubeconfig-path)
    image: quay.io/kuadrant/testsuite-pipelines-tools:latest
    imagePullPolicy: Always
  - name: uninstall-instances
    args:
      - |
        if [ "$(params.install-kuadrant)" = "true" ]; then
          helm uninstall -n=default --ignore-not-found --wait kuadrant-instances
        else
          echo "Skipping Kuadrant instances cleanup (install-kuadrant=false)"
        fi
    command:
      - /bin/bash
      - -vc
    env:
      - name: KUBECONFIG
        value: $(params.kubeconfig-path)
    image: quay.io/kuadrant/testsuite-pipelines-tools:latest
    imagePullPolicy: Always
  - name: uninstall-operators
    args:
      - |
        if [ "$(params.install-kuadrant)" = "true" ]; then
          helm uninstall -n=default --ignore-not-found --wait kuadrant-operators
        else
          echo "Skipping Kuadrant operators cleanup (install-kuadrant=false)"
        fi
    command:
      - /bin/bash
      - -vc
    env:
      - name: KUBECONFIG
        value: $(params.kubeconfig-path)
    image: quay.io/kuadrant/testsuite-pipelines-tools:latest
    imagePullPolicy: Always
  - name: delete-cert-manager-namespace
    args:
      - |
        if [ "$(params.install-kuadrant)" = "true" ]; then
          kubectl delete --ignore-not-found ns/cert-manager
        else
          echo "Skipping cert-manager namespace cleanup (install-kuadrant=false)"
        fi
    command:
      - /bin/bash
      - -vc
    env:
      - name: KUBECONFIG
        value: $(params.kubeconfig-path)
    image: quay.io/kuadrant/testsuite-pipelines-tools:latest
    imagePullPolicy: Always
  - name: delete-kuadrant-crd
    args:
      - |
        if [ "$(params.install-kuadrant)" = "true" ]; then
          kubectl get crd -o name | grep "kuadrant" | xargs --no-run-if-empty kubectl delete
        else
          echo "Skipping Kuadrant CRD cleanup (install-kuadrant=false)"
        fi
    command:
      - /bin/bash
      - -vc
    env:
      - name: KUBECONFIG
        value: $(params.kubeconfig-path)
    image: quay.io/kuadrant/testsuite-pipelines-tools:latest
    imagePullPolicy: Always
  - name: uninstall-tools-instances
    args:
      - |
        if [ "$(params.install-tools)" = "true" ]; then
          helm uninstall -n=default --ignore-not-found --wait tools-instances
        else
          echo "Skipping tools instances cleanup (install-tools=false)"
        fi
    command:
      - /bin/bash
      - -vc
    env:
      - name: KUBECONFIG
        value: $(params.kubeconfig-path)
    image: quay.io/kuadrant/testsuite-pipelines-tools:latest
    imagePullPolicy: Always
  - name: uninstall-tools-operators
    args:
      - |
        if [ "$(params.install-tools)" = "true" ]; then
          helm uninstall -n=default --ignore-not-found --wait tools-operators
        else
          echo "Skipping tools operators cleanup (install-tools=false)"
        fi
    command:
      - /bin/bash
      - -vc
    env:
      - name: KUBECONFIG
        value: $(params.kubeconfig-path)
    image: quay.io/kuadrant/testsuite-pipelines-tools:latest
    imagePullPolicy: Always

  # Install steps
  - name: helm-install-tools-operators
    script: |
      #!/bin/bash -v
      set -e
      if [ "$(params.install-tools)" = "true" ]; then
        helm install -n=default \
        --repo https://kuadrant.io/helm-charts-olm \
        $(params.additional-helm-tools-flags) \
        --wait --wait-for-jobs --debug \
        tools-operators \
        tools-operators
      else
        echo "Skipping tools operators install (install-tools=false)"
      fi
    env:
      - name: KUBECONFIG
        value: $(params.kubeconfig-path)
    image: quay.io/kuadrant/testsuite-pipelines-tools:latest
    imagePullPolicy: Always
  - name: helm-install-tools-instances
    script: |
      #!/bin/bash -v
      set -e
      if [ "$(params.install-tools)" = "true" ]; then
        helm install -n=default \
        --repo https://kuadrant.io/helm-charts-olm \
        $(params.additional-helm-tools-flags) \
        --wait --wait-for-jobs --debug --timeout=10m0s \
        tools-instances \
        tools-instances
      else
        echo "Skipping tools instances install (install-tools=false)"
      fi
    env:
      - name: KUBECONFIG
        value: $(params.kubeconfig-path)
    image: quay.io/kuadrant/testsuite-pipelines-tools:latest
    imagePullPolicy: Always
  - name: helm-install-operators
    script: |
      #!/bin/bash -v
      set -e
      if [ "$(params.install-kuadrant)" = "true" ]; then
        helm install -n=default \
          --repo https://kuadrant.io/helm-charts-olm \
          --values=/mount/values-additional-manifests/additionalManifests.yaml \
          --values=/mount/values-extensions-manifests/extensionsManifests.yaml \
          --set=kuadrant.indexImage="$(params.index-image)" \
          --set=kuadrant.channel="$(params.channel)" \
          --set=kuadrant.operatorName="$(params.operator-name)" \
          --set=kuadrant.extensionsImage="$(params.extensions-image)" \
          --set=istio.istioProvider="$(params.istio-provider)" \
          --set=gatewayAPI.version="$(params.gateway-crd)" \
          --set=tools.enabled=true \
          $(params.additional-helm-flags) \
          --wait --wait-for-jobs --debug \
          kuadrant-operators \
          kuadrant-operators
      else
        echo "Skipping Kuadrant operators install (install-kuadrant=false)"
      fi
    volumeMounts:
      - mountPath: /mount/values-additional-manifests
        name: values-additional-manifests
      - mountPath: /mount/values-extensions-manifests
        name: values-extensions-manifests
    env:
      - name: KUBECONFIG
        value: $(params.kubeconfig-path)
    image: quay.io/kuadrant/testsuite-pipelines-tools:latest
    imagePullPolicy: Always
  - name: helm-install-instances
    script: |
      #!/bin/bash -v
      set -e
      if [ "$(params.install-kuadrant)" = "true" ]; then
        helm install -n=default \
          --repo https://kuadrant.io/helm-charts-olm \
          --values=/mount/values-additional-manifests/additionalManifests.yaml \
          --set=kuadrant.indexImage="$(params.index-image)" \
          --set=kuadrant.channel="$(params.channel)" \
          --set=kuadrant.operatorName="$(params.operator-name)" \
          --set=istio.istioProvider="$(params.istio-provider)" \
          --set=gatewayAPI.version="$(params.gateway-crd)" \
          --set=tools.enabled=true \
          $(params.additional-helm-flags) \
          --wait --wait-for-jobs --debug \
          kuadrant-instances \
          kuadrant-instances
      else
        echo "Skipping Kuadrant instances install (install-kuadrant=false)"
      fi
    volumeMounts:
      - mountPath: /mount/values-additional-manifests
        name: values-additional-manifests
    env:
      - name: KUBECONFIG
        value: $(params.kubeconfig-path)
    image: quay.io/kuadrant/testsuite-pipelines-tools:latest
    imagePullPolicy: Always
  volumes:
    - secret:
        secretName: $(params.additional-manifests-secret)
      name: values-additional-manifests
    - configMap:
        name: values-extensions-manifests
      name: values-extensions-manifests
      
  workspaces:
  - name: shared-workspace
