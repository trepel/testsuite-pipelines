apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: dast-pipeline
spec:
  params:
    - description: URL of Kubernetes API
      name: kube-api
      type: string
    - description: API URL path, no leading slash
      name: api-url-path
      type: string
      default: openapi/v3/apis/kuadrant.io/v1
    - description: Name of the rapiDAST scan
      name: scan-name
      type: string
      default: kuadrant-io-v1
    - description: Token for Kubernetes API
      name: cluster-api-token
      type: string
  tasks:
    - name: clone-rapidast-repo
      taskRef:
        kind: Task
        name: clone-rapidast-repo
      workspaces:
        - name: shared-workspace
    - name: compose-config-file
      params:
        - name: kube-api
          value: $(params.kube-api)
        - name: api-url-path
          value: $(params.api-url-path)
        - name: scan-name
          value: $(params.scan-name)
        - name: cluster-api-token
          value: $(params.cluster-api-token)
      taskRef:
        kind: Task
        name: compose-config-file
      runAfter:
        - clone-rapidast-repo
      workspaces:
        - name: shared-workspace
    - name: rapidast-scan
      taskRef:
        kind: Task
        name: rapidast-scan
      runAfter:
        - compose-config-file
      workspaces:
        - name: shared-workspace
  workspaces:
    - name: shared-workspace
